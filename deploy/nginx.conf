# ==========================================================
# venvify-core — Nginx reverse proxy (VPS)
# 1. Thay TOÀN BỘ api.your-domain.com bằng domain thật
# 2. Symlink vào sites-enabled (setup_vps.sh tự làm) + reload
# 3. sudo certbot --nginx -d api.your-domain.com
# ==========================================================

# Rate limit 10 req/s mỗi IP, burst 20
limit_req_zone $binary_remote_addr zone=venvify_limit:10m rate=10r/s;

server {
    server_name api.your-domain.com;

    # --- Security headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Bật sau khi SSL ổn định:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    server_tokens off;
    client_max_body_size 10M;

    location / {
        limit_req zone=venvify_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    listen 80;
}
