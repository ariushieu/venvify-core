# ==========================================================
# CI - Build and Test (feature branches + PRs vào master)
# Chạy full `mvnw verify` với MySQL 8 thật → Flyway migrate V1..Vn
# + Hibernate ddl-auto=validate được kiểm chứng trên mỗi lần push.
# ==========================================================

name: CI - Build and Test

on:
  push:
    branches-ignore:
      - master                     # master do CD lo (CD cũng chạy test trước khi deploy)
  pull_request:
    branches:
      - master

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          # DB CI phù du (sống vài phút trên runner, localhost-only) → không cần password.
          # Tránh đặt literal password trong repo để secret scanner khỏi báo động giả.
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: venvify_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build and test
        env:
          # @SpringBootTest cần context thật: DB + secret. Không có literal secret nào ở đây:
          # MySQL CI chạy passwordless, JWT secret sinh ngẫu nhiên ngay trong step.
          MYSQL_USER: root
          MYSQL_PASSWORD: ""
          RESEND_API_KEY: re_ci_dummy_key
        run: |
          export SECRET_KEY=$(openssl rand -hex 32)
          chmod +x mvnw
          ./mvnw -B verify
