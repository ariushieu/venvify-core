# ==========================================================
# CD - Test, Build, Push & Deploy to VPS (chỉ master)
# Vì dev push thẳng master nên CD PHẢI chạy test trước khi deploy
# (không deploy code chưa test).
#
# GitHub Secrets cần có:
#   DOCKERHUB_USERNAME  - Docker Hub username
#   DOCKERHUB_TOKEN     - Docker Hub Access Token (KHÔNG phải password)
#   VPS_HOST            - IP/hostname VPS
#   VPS_USERNAME        - user SSH (vd root)
#   VPS_SSH_KEY         - private SSH key
# ==========================================================

name: CD - Deploy to VPS

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**/*.md"
      - "plan/**"
      - "docs/**"
      - ".env.example"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root
          MYSQL_DATABASE: venvify_db
          MYSQL_USER: venvify
          MYSQL_PASSWORD: ci_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build and test
        env:
          MYSQL_USER: venvify
          MYSQL_PASSWORD: ci_password
          SECRET_KEY: ci-only-jwt-secret-key-needs-at-least-32-bytes-0123456789abcdef
          RESEND_API_KEY: re_ci_dummy_key
        run: |
          chmod +x mvnw
          ./mvnw -B verify

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Docker Build & Push (Dockerfile multi-stage tự compile) ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/venvify-core:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/venvify-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Deploy: chỉ recreate app, KHÔNG đụng DB (--no-deps) ---
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -eu
            cd ~/vps-setup-kit/projects/venvify-core
            docker compose pull app
            docker compose up -d --no-deps --force-recreate app

      # --- Health check: đợi container healthy (healthcheck gọi /api/v1/health, kiểm cả DB) ---
      - name: Health check
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -eu
            container=venvify-core-app
            status=""
            for i in $(seq 1 15); do
              status=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container" 2>/dev/null || echo "missing")
              echo "Attempt $i: $status"
              if [ "$status" = "healthy" ]; then
                exit 0
              fi
              if [ "$status" = "exited" ] || [ "$status" = "dead" ] || [ "$status" = "missing" ]; then
                break
              fi
              sleep 8
            done
            echo "Final container status: $status"
            docker logs --tail=200 "$container" || true
            exit 1

      # --- Cleanup ---
      - name: Clean up old Docker images
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker image prune -af --filter "until=48h"
