server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: venvify-core

  datasource:
    # Prod (Docker) set SPRING_DATASOURCE_URL trỏ host `mysql`; dev mặc định localhost.
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/venvify_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      # Flyway sở hữu schema; Hibernate chỉ đối chiếu entity ↔ schema, KHÔNG tự sửa.
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          # T1 (architecture §15): UTC toàn tuyến — DB lưu UTC, client tự render giờ treo tường
          # theo events.timezone. Đổi múi giờ hiển thị là việc của FE, không phải của storage.
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

  jackson:
    time-zone: UTC  # T1: JSON timestamps ISO-8601 UTC (khớp hibernate.jdbc.time_zone)

logging:
  config: classpath:log4j2.xml

# Auth (JWT HS256 khóa chia sẻ — SPEC §5.2). Secret bắt buộc từ env, KHÔNG hard-code.
jwt:
  secret: ${SECRET_KEY}
  access-token-expiration: 900000      # 15 phút (ms)
  refresh-token-expiration: 604800000  # 7 ngày (ms)

# Gửi email qua Resend.
resend:
  api-key: ${RESEND_API_KEY}

app:
  cors:
    # CSV origin FE được phép gọi API. Override bằng env APP_CORS_ALLOWED_ORIGINS ở prod.
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  mail:
    from: ${RESEND_FROM_EMAIL:onboarding@resend.dev}
    verification-token-expiration: 600000  # OTP hiệu lực 10 phút (ms)

---
# Profile PROD (Docker/VPS): tắt log SQL cho gọn log & đỡ tốn I/O.
# Mọi secret/URL còn lại đã đọc từ env (SPRING_DATASOURCE_URL, SECRET_KEY, ...) — set trong .env của compose.
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

---
# Profile CHẠY MỘT LẦN để export DDL từ entity ra V1__init_schema.sql.
# Dùng: ./mvnw spring-boot:run -Dspring-boot.run.profiles=schema-gen
# Sau khi có file V1, không cần profile này nữa.
spring:
  config:
    activate:
      on-profile: schema-gen
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      jakarta:
        persistence:
          schema-generation:
            scripts:
              action: create
              create-source: metadata
              create-target: src/main/resources/db/migration/V1__init_schema.sql
  flyway:
    enabled: false