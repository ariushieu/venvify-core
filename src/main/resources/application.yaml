server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: venvify-core

  datasource:
    url: jdbc:mysql://localhost:3306/venvify_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      # Flyway sở hữu schema; Hibernate chỉ đối chiếu entity ↔ schema, KHÔNG tự sửa.
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

  jackson:
    time-zone: Asia/Ho_Chi_Minh

logging:
  config: classpath:log4j2.xml

# Auth (JWT HS256 khóa chia sẻ — SPEC §5.2). Secret bắt buộc từ env, KHÔNG hard-code.
jwt:
  secret: ${SECRET_KEY}
  access-token-expiration: 900000      # 15 phút (ms)
  refresh-token-expiration: 604800000  # 7 ngày (ms)

# Gửi email qua Resend.
resend:
  api-key: ${RESEND_API_KEY}

app:
  # Base URL dùng để dựng link xác thực email (đã gồm context-path /api/v1).
  base-url: ${APP_BASE_URL:http://localhost:8080/api/v1}
  mail:
    from: ${RESEND_FROM_EMAIL:onboarding@resend.dev}
    verification-token-expiration: 86400000  # 24 giờ (ms)

---
# Profile CHẠY MỘT LẦN để export DDL từ entity ra V1__init_schema.sql.
# Dùng: ./mvnw spring-boot:run -Dspring-boot.run.profiles=schema-gen
# Sau khi có file V1, không cần profile này nữa.
spring:
  config:
    activate:
      on-profile: schema-gen
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      jakarta:
        persistence:
          schema-generation:
            scripts:
              action: create
              create-source: metadata
              create-target: src/main/resources/db/migration/V1__init_schema.sql
  flyway:
    enabled: false