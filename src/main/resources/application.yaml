spring:
  application:
    name: venvify-core

  datasource:
    url: jdbc:mysql://localhost:3306/venvify_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: spring_user
    password: spring_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
      format_sql: true
      dialect: org.hibernate.dialect.MySQLDialect